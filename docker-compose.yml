# ============================================
# PMBIDMATRIX - Docker Compose
# Smart Procurement Intelligence & Auction Platform
# ============================================

version: '3.9'

services:
  # ─── Backend API Server ───────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: pmbidmatrix-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb+srv://himanshu12mathpal_db_user:R1fqso3X4mdgZLYR@cluster0.wr0jj0l.mongodb.net/pmbidmatrix
      - JWT_SECRET=pmbidmatrix-procurement-jwt-secret-2024
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGIN=http://localhost:3000
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - pmbidmatrix-network
    volumes:
      - backend-logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ─── Frontend (Nginx + React SPA) ────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: pmbidmatrix-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - pmbidmatrix-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Redis (Caching + Session + Pub/Sub) ─────
  redis:
    image: redis:7-alpine
    container_name: pmbidmatrix-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - pmbidmatrix-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MongoDB (Local Dev Alternative) ─────────
  mongo:
    image: mongo:7
    container_name: pmbidmatrix-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: pmbidmatrix2024
      MONGO_INITDB_DATABASE: pmbidmatrix
    volumes:
      - mongo-data:/data/db
      - mongo-config:/data/configdb
    networks:
      - pmbidmatrix-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── Prometheus (Monitoring) ─────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: pmbidmatrix-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - pmbidmatrix-network

  # ─── Grafana (Dashboards) ───────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: pmbidmatrix-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=pmbidmatrix2024
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - pmbidmatrix-network

# ─── Networks ──────────────────────────────────
networks:
  pmbidmatrix-network:
    driver: bridge
    name: pmbidmatrix-net

# ─── Volumes ──────────────────────────────────
volumes:
  mongo-data:
    name: pmbidmatrix-mongo-data
  mongo-config:
    name: pmbidmatrix-mongo-config
  redis-data:
    name: pmbidmatrix-redis-data
  backend-logs:
    name: pmbidmatrix-backend-logs
  prometheus-data:
    name: pmbidmatrix-prometheus-data
  grafana-data:
    name: pmbidmatrix-grafana-data
